  assemblies:
  - MarketDataCollector.Core
  namespace: MarketDataCollector.Core.Performance
  summary: >-
    Zero-allocation struct representation of a trade event for the hot path.

    Uses <xref href="System.Runtime.InteropServices.LayoutKind.Sequential" data-throw-if-not-resolved="false"></xref> for predictable memory layout in

    the <xref href="MarketDataCollector.Core.Performance.SpscRingBuffer%601" data-throw-if-not-resolved="false"></xref> backing array.
  remarks: >-
    The symbol is stored as a pre-computed integer ID from <xref href="MarketDataCollector.Core.Performance.SymbolTable" data-throw-if-not-resolved="false"></xref>

    to avoid string references on the producer thread.

    Consumers resolve the ID back to a symbol string via the same table.
