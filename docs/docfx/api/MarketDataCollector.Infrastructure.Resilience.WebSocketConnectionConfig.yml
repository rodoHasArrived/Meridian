    startLine: 49
  assemblies:
  - MarketDataCollector.Infrastructure
  namespace: MarketDataCollector.Infrastructure.Resilience
  summary: >-
    Centralized configuration for WebSocket connections.

    Provides sensible defaults used by all streaming providers (Alpaca, Polygon, etc.)

    to eliminate duplicate configuration across providers.
  remarks: >-
    <p>

    <b>Profile Selection Guide:</b>

    </p>

    <ul><li><span class="term"><xref href="MarketDataCollector.Infrastructure.Resilience.WebSocketConnectionConfig.Default" data-throw-if-not-resolved="false"></xref></span>
          Use for providers with fast reconnection (Alpaca, Polygon).
          5 retries with 2s base delay provides ~62s total retry time.
          Suitable for providers with reliable infrastructure.
        </li><li><span class="term"><xref href="MarketDataCollector.Infrastructure.Resilience.WebSocketConnectionConfig.Resilient" data-throw-if-not-resolved="false"></xref></span>
          Use for providers with slower reconnection or on unreliable networks (StockSharp, IB Gateway).
          10 retries with 3s base delay and longer circuit breaker duration.
          Suitable when provider infrastructure is slower or network is unstable.
        </li><li><span class="term"><xref href="MarketDataCollector.Infrastructure.Resilience.WebSocketConnectionConfig.HighFrequency" data-throw-if-not-resolved="false"></xref></span>
          Use for tick-by-tick data where latency is critical.
          Shorter timeouts (15s) ensure faster failure detection.
          Trade-off: May disconnect more frequently on slow networks.
        </li></ul>
    <p>

    <b>Current Provider Assignments:</b>

    </p>

    <ul><li>Alpaca: Default (fast cloud infrastructure)</li><li>Polygon: Default (fast cloud infrastructure)</li><li>StockSharp: Resilient (broker-dependent latency)</li><li>Interactive Brokers: Resilient (TWS/Gateway may have delays)</li></ul>
  example: []
  syntax:
    content: 'public sealed record WebSocketConnectionConfig : IEquatable<WebSocketConnectionConfig>'
    content.vb: Public NotInheritable Class WebSocketConnectionConfig Implements IEquatable(Of WebSocketConnectionConfig)
  inheritance:
