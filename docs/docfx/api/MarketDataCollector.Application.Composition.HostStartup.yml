  assemblies:
  - MarketDataCollector.Application
  namespace: MarketDataCollector.Application.Composition
  summary: >-
    Unified startup class that provides a single entry point for all host types.

    All hosts flow through this class, which delegates to ServiceCompositionRoot.
  remarks: >-
    <p><b>Design Philosophy:</b></p>

    <ul><li>Single setup path for CLI, Web, and Desktop modes</li><li>Uses ServiceCompositionRoot for all DI registration</li><li>Host-specific adapters customize endpoint exposure</li><li>Eliminates duplicated service wiring across hosts</li></ul>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Unified host startup for all deployment modes")]

      public sealed class HostStartup : IAsyncDisposable
    content.vb: >-
      <ImplementsAdr("ADR-001", "Unified host startup for all deployment modes")>

      Public NotInheritable Class HostStartup Implements IAsyncDisposable
