  assemblies:
  - MarketDataCollector.Contracts
  namespace: MarketDataCollector.Contracts.Domain
  summary: >-
    Zero-cost value object representing a normalized, canonical market instrument symbol.

    Distinct from <xref href="MarketDataCollector.Contracts.Domain.SymbolId" data-throw-if-not-resolved="false"></xref> (the raw provider symbol) to prevent accidental

    use of un-normalized symbols where a canonical symbol is expected and vice-versa.
  remarks: >-
    Use this type wherever a symbol has been through the canonicalization pipeline

    (e.g. "AAPL.US" from Stooq → "AAPL" as the canonical form).

    The compiler will then enforce that raw and canonical symbols are never silently interchanged.

    Equality and comparison are case-insensitive; values are stored in uppercase.
  example: []
  syntax:
    content: 'public readonly struct CanonicalSymbol : IEquatable<CanonicalSymbol>, IComparable<CanonicalSymbol>'
    content.vb: Public Structure CanonicalSymbol Implements IEquatable(Of CanonicalSymbol), IComparable(Of CanonicalSymbol)
  implements:
