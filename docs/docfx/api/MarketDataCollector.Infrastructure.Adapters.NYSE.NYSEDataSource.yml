  assemblies:
  - MarketDataCollector.Infrastructure
  namespace: MarketDataCollector.Infrastructure.Adapters.NYSE
  summary: >-
    NYSE Direct Connection data source providing real-time and historical market data

    directly from the New York Stock Exchange.


    Features:

    - Real-time trades and quotes via NYSE Integrated Feed

    - Historical daily OHLCV bars via NYSE Historical Data API

    - Level 2 market depth (Premium/Professional tiers)

    - Trade conditions and participant IDs

    - Pre-market and after-hours data

    - Corporate actions (dividends, splits)


    Requires NYSE Connect API credentials and appropriate data subscriptions.
  example: []
  syntax:
    content: >-
      [DataSource("nyse", "NYSE Direct", DataSourceType.Hybrid, DataSourceCategory.Exchange, Priority = 5, Description = "Direct connection to NYSE for real-time and historical US equity data")]

      [ImplementsAdr("ADR-001", "NYSE streaming and historical data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      public sealed class NYSEDataSource : DataSourceBase, IRealtimeDataSource, IHistoricalDataSource, IDataSource, IAsyncDisposable
    content.vb: >-
      <DataSource("nyse", "NYSE Direct", DataSourceType.Hybrid, DataSourceCategory.Exchange, Priority:=5, Description:="Direct connection to NYSE for real-time and historical US equity data")>

      <ImplementsAdr("ADR-001", "NYSE streaming and historical data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      Public NotInheritable Class NYSEDataSource Inherits DataSourceBase Implements IRealtimeDataSource, IHistoricalDataSource, IDataSource, IAsyncDisposable
