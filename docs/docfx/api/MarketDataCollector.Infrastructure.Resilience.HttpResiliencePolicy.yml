  namespace: MarketDataCollector.Infrastructure.Resilience
  summary: >-
    Creates a comprehensive resilience pipeline combining retry, circuit breaker, and timeout.

    This is the recommended pipeline for production HTTP clients.
  example: []
  syntax:
    content: public static ResiliencePipeline<HttpResponseMessage> CreateComprehensivePipeline(int maxRetries = 3, TimeSpan? retryBaseDelay = null, int circuitBreakerFailureThreshold = 5, TimeSpan? circuitBreakerDuration = null, TimeSpan? requestTimeout = null)
    parameters:
    - id: maxRetries
      type: System.Int32
      description: 'Maximum retry attempts (default: 3)'
    - id: retryBaseDelay
      type: System.Nullable{System.TimeSpan}
      description: 'Base delay for retries (default: 1 second)'
    - id: circuitBreakerFailureThreshold
      type: System.Int32
      description: 'Failures before circuit opens (default: 5)'
    - id: circuitBreakerDuration
      type: System.Nullable{System.TimeSpan}
      description: 'Duration circuit stays open (default: 30 seconds)'
    - id: requestTimeout
      type: System.Nullable{System.TimeSpan}
      description: 'Individual request timeout (default: 30 seconds)'
    return:
      type: Polly.ResiliencePipeline{System.Net.Http.HttpResponseMessage}
