  assemblies:
  - MarketDataCollector.Storage
  namespace: MarketDataCollector.Storage.Services
  summary: Drain up to <code class="paramref">maxCount</code> events from the front of the buffer.
  remarks: >-
    This operation is O(n) in the number of <em>remaining</em> elements because

    <xref href="System.Collections.Generic.List%601.RemoveRange(System.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref> must shift the tail. For high-frequency partial

    drains consider using <xref href="MarketDataCollector.Storage.Services.EventBuffer%601.DrainAll" data-throw-if-not-resolved="false"></xref> with an external cap instead.
  example: []
