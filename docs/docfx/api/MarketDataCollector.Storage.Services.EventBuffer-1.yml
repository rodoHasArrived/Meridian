  assemblies:
  - MarketDataCollector.Storage
  namespace: MarketDataCollector.Storage.Services
  summary: >-
    Thread-safe generic event buffer using a swap-buffer drain strategy to eliminate

    per-drain allocations. Maintains two <xref href="System.Collections.Generic.List%601" data-throw-if-not-resolved="false"></xref> instances: <code>_active</code>

    (receives new events) and <code>_standby</code> (returned to callers from

    <xref href="MarketDataCollector.Storage.Services.EventBuffer%601.DrainAll" data-throw-if-not-resolved="false"></xref> so they can process events without holding the lock).


    <p>

    Eliminates the duplicate lock-based buffer implementations that existed in

    JsonlStorageSink and ParquetStorageSink.

    </p>
  example: []
  syntax:
    content: 'public class EventBuffer<T> : IDisposable where T : class'
    typeParameters:
    - id: T
      description: Type of events to buffer.
    content.vb: Public Class EventBuffer(Of T As Class) Implements IDisposable
