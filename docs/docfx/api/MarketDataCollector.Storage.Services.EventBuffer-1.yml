  assemblies:
  - MarketDataCollector.Storage
  namespace: MarketDataCollector.Storage.Services
  summary: >-
    Atomically drains all buffered events via a buffer swap — no copy allocation.


    <p>

    The returned <xref href="System.Collections.Generic.IReadOnlyList%601" data-throw-if-not-resolved="false"></xref> is the buffer's internal backing store

    and will be cleared and reused on the <em>next</em> call to <xref href="MarketDataCollector.Storage.Services.EventBuffer%601.DrainAll" data-throw-if-not-resolved="false"></xref>.

    Callers must complete all processing of the returned list before the next drain

    cycle begins on the same buffer instance.

    </p>
  example: []
  syntax:
    content: public IReadOnlyList<T> DrainAll()
    return:
      type: System.Collections.Generic.IReadOnlyList{{T}}
    content.vb: Public Function DrainAll() As IReadOnlyList(Of T)
