  assemblies:
  - MarketDataCollector.Application
  namespace: MarketDataCollector.Application.Config
  summary: >-
    Unified deployment context that captures all deployment-related settings at startup.

    This reduces conditional branching across entry points by centralizing deployment mode logic.
  remarks: >-
    <p><b>Supported Deployment Modes:</b></p>

    <ul><li><b>Headless</b> - Console application, no UI, suitable for servers/containers</li><li><b>Web</b> - HTTP server with web dashboard on configurable port</li><li><b>Desktop</b> - Native desktop app with embedded HTTP server for local UI</li></ul>

    <p>The context is immutable once created and provides all deployment-related decisions

    through computed properties, eliminating scattered conditional logic.</p>
  example: []
  syntax:
    content: 'public sealed record DeploymentContext : IEquatable<DeploymentContext>'
    content.vb: Public NotInheritable Class DeploymentContext Implements IEquatable(Of DeploymentContext)
