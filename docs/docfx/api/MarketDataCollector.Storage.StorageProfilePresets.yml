  namespace: MarketDataCollector.Storage
  summary: >-
    Applies a storage profile to the given options.

    If no profile is specified, applies the default profile (Research).
  example: []
  syntax:
    content: public static StorageOptions ApplyProfile(string? profile, StorageOptions options, bool useDefaultIfEmpty = true)
    parameters:
    - id: profile
      type: System.String
      description: Profile ID, or null/empty to use default.
    - id: options
      type: MarketDataCollector.Storage.StorageOptions
      description: Base storage options to apply profile to.
    - id: useDefaultIfEmpty
      type: System.Boolean
      description: If true, applies default profile when profile is null/empty. Default is true.
    return:
      type: MarketDataCollector.Storage.StorageOptions
      description: Storage options with profile settings applied.
