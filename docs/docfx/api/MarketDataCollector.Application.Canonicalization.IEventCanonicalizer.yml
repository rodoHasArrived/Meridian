  summary: >-
    Transforms a raw <xref href="MarketDataCollector.Domain.Events.MarketEvent" data-throw-if-not-resolved="false"></xref> into a canonicalized event by resolving symbols,

    mapping condition codes, and normalizing venue identifiers.

    Runs <b>before</b> <code>EventPipeline.PublishAsync()</code> to avoid adding latency to the

    high-throughput sink path.
