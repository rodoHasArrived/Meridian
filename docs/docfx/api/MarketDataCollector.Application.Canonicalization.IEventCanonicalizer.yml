  - MarketDataCollector.Application
  namespace: MarketDataCollector.Application.Canonicalization
  summary: >-
    Canonicalizes a raw market event. Returns the enriched event with canonical fields populated.

    The original <xref href="MarketDataCollector.Domain.Events.MarketEvent.Symbol" data-throw-if-not-resolved="false"></xref> is never mutated.
  example: []
  syntax:
    content: MarketEvent Canonicalize(MarketEvent raw, CancellationToken ct = default)
    parameters:
    - id: raw
      type: MarketDataCollector.Domain.Events.MarketEvent
      description: The raw event from a provider adapter.
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: MarketDataCollector.Domain.Events.MarketEvent
      description: The canonicalized event with <xref href="MarketDataCollector.Domain.Events.MarketEvent.Tier" data-throw-if-not-resolved="false"></xref> set to <code>Enriched</code>.
    content.vb: Function Canonicalize(raw As MarketEvent, ct As CancellationToken = Nothing) As MarketEvent
  overload: MarketDataCollector.Application.Canonicalization.IEventCanonicalizer.Canonicalize*
