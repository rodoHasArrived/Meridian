  assemblies:
  - MarketDataCollector.Application
  namespace: MarketDataCollector.Application.Config
  summary: >-
    Unified configuration pipeline that always produces a validated, normalized configuration.

    This is the single entry point for all configuration loading regardless of source

    (file, wizard, auto-config, hot reload, programmatic).
  remarks: >-
    <p><b>Pipeline Stages:</b></p>

    <ol><li>Load base configuration from source</li><li>Apply environment-specific overlay (e.g., appsettings.Production.json)</li><li>Apply environment variable overrides</li><li>Resolve credentials from all sources</li><li>Apply self-healing fixes (optional)</li><li>Validate the final configuration</li><li>Return ValidatedConfig with full metadata</li></ol>
  example: []
