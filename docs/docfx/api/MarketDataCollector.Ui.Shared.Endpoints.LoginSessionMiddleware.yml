  assemblies:
  - MarketDataCollector.Ui.Shared
  namespace: MarketDataCollector.Ui.Shared.Endpoints
  summary: >-
    Middleware that enforces session-based authentication when MDC_USERNAME and

    MDC_PASSWORD environment variables are both configured.


    <ul><li>Health probes (/healthz, /readyz, /livez) are always exempt.</li><li>The login page (/login) and auth API endpoints (/api/auth/*) are always exempt.</li><li>Unauthenticated API requests receive a 401 JSON response.</li><li>Unauthenticated browser (non-/api) requests are redirected to /login.</li><li>When no credentials are configured all requests pass through (backward-compatible).</li></ul>
