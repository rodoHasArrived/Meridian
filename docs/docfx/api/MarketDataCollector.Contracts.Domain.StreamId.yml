  namespace: MarketDataCollector.Contracts.Domain
  summary: >-
    Zero-cost value object representing a data-stream identifier.

    Prevents accidental interchange of stream IDs with <xref href="MarketDataCollector.Contracts.Domain.SymbolId" data-throw-if-not-resolved="false"></xref>,

    <xref href="MarketDataCollector.Contracts.Domain.ProviderId" data-throw-if-not-resolved="false"></xref>, or <xref href="MarketDataCollector.Contracts.Domain.VenueCode" data-throw-if-not-resolved="false"></xref>.
  remarks: >-
    Stream IDs are provider-specific opaque identifiers (e.g. a WebSocket channel name

    or a subscription correlation token). They are treated as case-sensitive strings

    to preserve exact provider values.
