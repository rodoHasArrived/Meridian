  assemblies:
  - MarketDataCollector.Infrastructure
  namespace: MarketDataCollector.Infrastructure.Adapters.Alpaca
  summary: >-
    Alpaca Market Data client (WebSocket) that implements the IMarketDataClient abstraction.


    Current support:

    - Trades: YES (streams "t" messages and forwards to TradeDataCollector)

    - Depth (L2): NO (Alpaca stock stream provides quotes/BBO, not full L2 updates; method returns -1)


    Notes:

    - Alpaca typically limits to 1 active stream connection per user per endpoint.

    - Authentication is performed by sending an "auth" message immediately after connect.
  example: []
  syntax:
    content: >-
      [DataSource("alpaca", "Alpaca Markets", DataSourceType.Realtime, DataSourceCategory.Broker, Priority = 10, Description = "WebSocket streaming from Alpaca Markets")]

      [ImplementsAdr("ADR-001", "Alpaca streaming data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class AlpacaMarketDataClient : IMarketDataClient, IProviderMetadata, IAsyncDisposable
    content.vb: >-
      <DataSource("alpaca", "Alpaca Markets", DataSourceType.Realtime, DataSourceCategory.Broker, Priority:=10, Description:="WebSocket streaming from Alpaca Markets")>

      <ImplementsAdr("ADR-001", "Alpaca streaming data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class AlpacaMarketDataClient Implements IMarketDataClient, IProviderMetadata, IAsyncDisposable
