  assemblies:
  - MarketDataCollector.Storage
  namespace: MarketDataCollector.Storage
  summary: >-
    Explicit list of storage sink plugin IDs to activate at startup.

    When non-empty, overrides <xref href="MarketDataCollector.Storage.StorageOptions.EnableParquetSink" data-throw-if-not-resolved="false"></xref> and drives

    dynamic composition via <code>StorageSinkRegistry</code>.
  remarks: >-
    Each entry must match the <code>Id</code> declared on a discovered

    <xref href="MarketDataCollector.Storage.StorageSinkAttribute" data-throw-if-not-resolved="false"></xref>-decorated class.

    Example: <code>["jsonl", "parquet"]</code>
