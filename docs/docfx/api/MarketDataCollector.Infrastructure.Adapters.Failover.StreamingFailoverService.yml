  assemblies:
  - MarketDataCollector.Infrastructure
  namespace: MarketDataCollector.Infrastructure.Adapters.Failover
  summary: >-
    Orchestrates automatic failover between streaming market data providers.

    Monitors provider health via <xref href="MarketDataCollector.Application.Monitoring.IConnectionHealthMonitor" data-throw-if-not-resolved="false"></xref>, evaluates

    configured <xref href="MarketDataCollector.Application.Config.FailoverRuleConfig" data-throw-if-not-resolved="false"></xref> rules, and triggers switchover

    when consecutive failures exceed the threshold.
  remarks: >-
    Implements ADR-001 provider abstraction with runtime failover coordination

    that was previously missing for streaming providers.
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Runtime streaming provider failover orchestration")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      public sealed class StreamingFailoverService : IDisposable
    content.vb: >-
      <ImplementsAdr("ADR-001", "Runtime streaming provider failover orchestration")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      Public NotInheritable Class StreamingFailoverService Implements IDisposable
