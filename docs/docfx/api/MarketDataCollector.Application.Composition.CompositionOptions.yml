  summary: >-
    Whether to enable canonicalization services (symbol resolution, condition

    code mapping, venue normalization). When enabled, a <xref href="MarketDataCollector.Application.Canonicalization.CanonicalizingPublisher" data-throw-if-not-resolved="false"></xref>

    decorator wraps <xref href="MarketDataCollector.Domain.Events.IMarketEventPublisher" data-throw-if-not-resolved="false"></xref> to enrich events before

    they reach the pipeline. The actual canonicalization behavior is further gated

    by <xref href="MarketDataCollector.Application.Config.CanonicalizationConfig.Enabled" data-throw-if-not-resolved="false"></xref> in <code>appsettings.json</code>.
