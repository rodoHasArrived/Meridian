  summary: Creates a new serializer backed by the given symbol table.
  example: []
  syntax:
    content: public HotPathBatchSerializer(SymbolTable symbolTable, int initialBufferCapacity = 65536)
    parameters:
    - id: symbolTable
      type: MarketDataCollector.Core.Performance.SymbolTable
      description: >-
        Shared symbol table used to resolve integer symbol IDs back to strings.

        Must be the same instance used by the producing ring-buffer writer.
    - id: initialBufferCapacity
      type: System.Int32
      description: >-
        Initial byte capacity of the pre-allocated write buffer.

        The buffer grows automatically when the batch exceeds this size.

        Default is 64 KiB — sufficient for ~500 trade events.
    content.vb: Public Sub New(symbolTable As SymbolTable, initialBufferCapacity As Integer = 65536)
