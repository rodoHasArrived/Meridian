  summary: Serializes a batch of <xref href="MarketDataCollector.Core.Performance.RawTradeEvent" data-throw-if-not-resolved="false"></xref> structs to JSONL UTF-8 bytes.
  remarks: >-
    The returned <xref href="System.ReadOnlyMemory%601" data-throw-if-not-resolved="false"></xref> is valid only until the next call

    to <xref href="MarketDataCollector.Application.Pipeline.HotPathBatchSerializer.SerializeTrades(System.ReadOnlySpan%7bMarketDataCollector.Core.Performance.RawTradeEvent%7d)" data-throw-if-not-resolved="false"></xref> or <xref href="MarketDataCollector.Application.Pipeline.HotPathBatchSerializer.SerializeQuotes(System.ReadOnlySpan%7bMarketDataCollector.Core.Performance.RawQuoteEvent%7d)" data-throw-if-not-resolved="false"></xref> on this instance

    (the underlying buffer is reused).  Copy the bytes if longer lifetime is needed.
  example: []
  syntax:
    content: public ReadOnlyMemory<byte> SerializeTrades(ReadOnlySpan<RawTradeEvent> batch)
    parameters:
    - id: batch
      type: System.ReadOnlySpan{MarketDataCollector.Core.Performance.RawTradeEvent}
      description: Span of trade events to serialize.
    return:
      type: System.ReadOnlyMemory{System.Byte}
      description: >-
        UTF-8 encoded JSONL bytes — one JSON object per line, terminated by <code>\n</code>.

        Returns an empty span when <code class="paramref">batch</code> is empty.
    content.vb: Public Function SerializeTrades(batch As ReadOnlySpan(Of RawTradeEvent)) As ReadOnlyMemory(Of Byte)
