  assemblies:
  - MarketDataCollector.Application
  namespace: MarketDataCollector.Application.Pipeline
  summary: >-
    Batch-serializes hot-path struct events (<xref href="MarketDataCollector.Core.Performance.RawTradeEvent" data-throw-if-not-resolved="false"></xref>,

    <xref href="MarketDataCollector.Core.Performance.RawQuoteEvent" data-throw-if-not-resolved="false"></xref>) to JSONL-formatted UTF-8 bytes.
  remarks: >-
    <p>

    A pre-allocated <xref href="System.Buffers.ArrayBufferWriter%601" data-throw-if-not-resolved="false"></xref> is reused across calls so that

    the backing byte array grows at most logarithmically and is never released to the

    GC between batches.  A <xref href="System.Text.Json.Utf8JsonWriter" data-throw-if-not-resolved="false"></xref> is reset (not re-constructed)

    before each batch to avoid repeated small allocations in the consumer loop.

    </p>

    <p>

    <b>Not thread-safe.</b> A single instance must only be used from the consumer

    thread that drains the corresponding <xref href="MarketDataCollector.Core.Performance.SpscRingBuffer%601" data-throw-if-not-resolved="false"></xref>.

    </p>

    <p>

    The JSON schema emitted for each event is a compact, flat JSON line intended for

    hot-path processing. Each line represents a single trade or quote object:


    <pre><code class="lang-csharp">{"timestamp":"…","symbol":"SPY","price":100.01,"size":200,"aggressor":1,"sequence":42}</code></pre>


    Quote events follow a similar shape with bid/ask-specific fields.

    This schema is specific to the hot-path pipeline and does not include the

    higher-level <code>MarketEvent</code> envelope (such as <code>type</code> or <code>payload</code>).

    </p>
  example: []
