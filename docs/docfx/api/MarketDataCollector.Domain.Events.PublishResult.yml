  namespace: MarketDataCollector.Domain.Events
  summary: >-
    Detailed result of a <xref href="MarketDataCollector.Domain.Events.IMarketEventPublisher.TryPublish(MarketDataCollector.Domain.Events.MarketEvent%40)" data-throw-if-not-resolved="false"></xref> call.

    Provides richer information than a plain <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">bool</a> so that producers

    can make informed throttling decisions rather than silently dropping events.
  remarks: >-
    Use <code>EventPipeline.TryPublishWithResult</code> when you need the detailed result.

    The original <xref href="MarketDataCollector.Domain.Events.IMarketEventPublisher.TryPublish(MarketDataCollector.Domain.Events.MarketEvent%40)" data-throw-if-not-resolved="false"></xref> continues to return

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">bool</a> for backward compatibility.
  example: []
