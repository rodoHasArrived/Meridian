  type: Field
  source:
    remote:
      path: src/MarketDataCollector.Domain/Events/PublishResult.cs
      branch: copilot/debug-data-collector-actions
      repo: https://github.com/rodoHasArrived/Market-Data-Collector
    id: Dropped
    path: ../../src/MarketDataCollector.Domain/Events/PublishResult.cs
    startLine: 33
  assemblies:
  - MarketDataCollector.Domain
  namespace: MarketDataCollector.Domain.Events
  summary: >-
    The event was not accepted because the pipeline queue was full and the active

    backpressure policy rejected the write (for example, DropWrite pre-checks or a

    failed <code>TryWrite</code> on the underlying channel).

    This result corresponds to <xref href="MarketDataCollector.Domain.Events.IMarketEventPublisher.TryPublish(MarketDataCollector.Domain.Events.MarketEvent%40)" data-throw-if-not-resolved="false"></xref> returning

    <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> and does not include silent evictions that may occur in

    DropOldest/DropNewest modes.
  example: []
  syntax:
    content: Dropped = 2
    return:
      type: MarketDataCollector.Domain.Events.PublishResult
