  assemblies:
  - MarketDataCollector.Contracts
  namespace: MarketDataCollector.Contracts.Schema
  summary: Contract for upgrading a stored record from an older schema version to the current one.
  remarks: >-
    Implement this interface for each schema version transition so that old JSONL files

    remain readable as the domain model evolves, without requiring bulk data migration.


    <p>Registration pattern:</p>

    <pre><code class="lang-csharp">// Register in DI:

    services.AddSingleton&lt;ISchemaUpcaster&lt;Trade&gt;&gt;, TradeV1ToCurrentUpcaster&gt;();</code></pre>


    <p>Convention: the implementing class name should follow the pattern

    <code>{DomainType}V{FromVersion}ToCurrentUpcaster</code> so it is self-documenting.</p>
  example: []
  syntax:
    content: public interface ISchemaUpcaster<out T>
    typeParameters:
    - id: T
      description: The current (latest) domain type that this upcaster produces.
    content.vb: Public Interface ISchemaUpcaster(Of Out T)
