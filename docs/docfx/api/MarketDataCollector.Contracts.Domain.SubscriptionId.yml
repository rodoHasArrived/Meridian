  assemblies:
  - MarketDataCollector.Contracts
  namespace: MarketDataCollector.Contracts.Domain
  summary: >-
    Zero-cost value object representing a market-data subscription identifier.

    Prevents accidental interchange of subscription IDs with other integer-typed identifiers

    such as sequence numbers or request IDs.
  remarks: >-
    Subscription IDs are returned by <code>SubscribeTrades</code> / <code>SubscribeMarketDepth</code>

    on <code>IMarketDataClient</code> implementations and must be passed back to unsubscribe.

    Wrapping the bare <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/integral-numeric-types">int</a> in this type makes the intent explicit at

    call sites and prevents silent mixups with unrelated integer-typed parameters.
  example: []
  syntax:
    content: 'public readonly struct SubscriptionId : IEquatable<SubscriptionId>, IComparable<SubscriptionId>'
    content.vb: Public Structure SubscriptionId Implements IEquatable(Of SubscriptionId), IComparable(Of SubscriptionId)
