  summary: Configuration for historical backfill operations.
  example: []
  syntax:
    content: public BackfillConfig(bool Enabled = false, string Provider = "composite", string[]? Symbols = null, DateOnly? From = null, DateOnly? To = null, string Granularity = "daily", bool EnableFallback = true, bool PreferAdjustedPrices = true, bool EnableSymbolResolution = true, string[]? ProviderPriority = null, bool EnableRateLimitRotation = true, double RateLimitRotationThreshold = 0.8, bool SkipExistingData = true, bool FillGapsOnly = true, BackfillJobsConfig? Jobs = null, BackfillProvidersConfig? Providers = null)
    parameters:
    - id: Enabled
      type: System.Boolean
      description: When true, the collector will run a backfill instead of live collection.
    - id: Provider
      type: System.String
      description: Primary historical data provider (e.g. "stooq", "yahoo", "nasdaq", "composite").
    - id: Symbols
      type: System.String[]
      description: Symbols to backfill; defaults to configured live symbols.
    - id: From
      type: System.Nullable{System.DateOnly}
      description: Optional inclusive start date (UTC).
    - id: To
      type: System.Nullable{System.DateOnly}
      description: Optional inclusive end date (UTC).
    - id: Granularity
      type: System.String
      description: 'Data granularity: "daily", "hourly", "minute1", "minute5", etc.'
    - id: EnableFallback
      type: System.Boolean
      description: When true and using composite provider, automatically try alternative providers on failure.
    - id: PreferAdjustedPrices
      type: System.Boolean
      description: Prefer providers that return adjusted prices (for splits/dividends).
    - id: EnableSymbolResolution
      type: System.Boolean
      description: Use OpenFIGI to normalize symbols across providers.
    - id: ProviderPriority
      type: System.String[]
      description: Custom provider priority order for fallback (overrides defaults).
    - id: EnableRateLimitRotation
      type: System.Boolean
      description: Automatically rotate to next provider when approaching rate limits.
    - id: RateLimitRotationThreshold
      type: System.Double
      description: Usage threshold (0.0-1.0) at which to start rotating providers.
    - id: SkipExistingData
      type: System.Boolean
      description: Check existing archives and skip dates that already have data.
    - id: FillGapsOnly
      type: System.Boolean
      description: Only fill detected gaps in existing data (vs. full backfill).
    - id: Jobs
      type: MarketDataCollector.Application.Config.BackfillJobsConfig
      description: Job management configuration.
    - id: Providers
      type: MarketDataCollector.Application.Config.BackfillProvidersConfig
      description: Configuration for individual data providers.
    content.vb: Public Sub New(Enabled As Boolean = False, Provider As String = "composite", Symbols As String() = Nothing, From As DateOnly? = Nothing, [To] As DateOnly? = Nothing, Granularity As String = "daily", EnableFallback As Boolean = True, PreferAdjustedPrices As Boolean = True, EnableSymbolResolution As Boolean = True, ProviderPriority As String() = Nothing, EnableRateLimitRotation As Boolean = True, RateLimitRotationThreshold As Double = 0.8, SkipExistingData As Boolean = True, FillGapsOnly As Boolean = True, Jobs As BackfillJobsConfig = Nothing, Providers As BackfillProvidersConfig = Nothing)
