  namespace: MarketDataCollector.Application.Config
  summary: >-
    Configuration for the F# validation pipeline stage.

    When enabled, every incoming <xref href="MarketDataCollector.Domain.Events.MarketEvent" data-throw-if-not-resolved="false"></xref>

    is validated against the F# Railway-Oriented validators before it is persisted.

    Events that fail validation are written to the dead-letter sink instead of primary storage.
  example: []
  syntax:
    content: public ValidationPipelineConfig(bool Enabled = false, bool UseRealTimeMode = false)
    parameters:
    - id: Enabled
      type: System.Boolean
      description: >-
        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, the F# validation stage is activated.

        Defaults to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> to preserve backward-compatible behaviour.
    - id: UseRealTimeMode
      type: System.Boolean
      description: >-
        When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>, stricter real-time configuration is applied:

        timestamp max-age drops from 5 minutes to 5 seconds, and sequence numbers

        are checked for continuity. Disable for historical backfill or replay scenarios.
    content.vb: Public Sub New(Enabled As Boolean = False, UseRealTimeMode As Boolean = False)
