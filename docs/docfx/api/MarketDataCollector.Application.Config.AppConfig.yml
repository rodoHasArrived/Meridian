  example: []
  syntax:
    content: public AppConfig(string DataRoot = "data", bool? Compress = null, DataSourceKind DataSource = DataSourceKind.IB, AlpacaOptions? Alpaca = null, IBOptions? IB = null, PolygonOptions? Polygon = null, StockSharpConfig? StockSharp = null, StorageConfig? Storage = null, SymbolConfig[]? Symbols = null, BackfillConfig? Backfill = null, SourceRegistryConfig? Sources = null, DataSourcesConfig? DataSources = null, DerivativesConfig? Derivatives = null, ProviderRegistryConfig? ProviderRegistry = null, CanonicalizationConfig? Canonicalization = null, ValidationPipelineConfig? Validation = null)
    parameters:
    - id: DataRoot
      type: System.String
      description: Output directory root for storage sinks.
    - id: Compress
      type: System.Nullable{System.Boolean}
      description: Whether JSONL sinks should gzip. Null means use base configuration/default.
    - id: DataSource
      type: MarketDataCollector.Application.Config.DataSourceKind
      description: >-
        Market data provider selector:

        - <xref href="MarketDataCollector.Application.Config.DataSourceKind.IB" data-throw-if-not-resolved="false"></xref> (default) uses Interactive Brokers via IMarketDataClient/IBMarketDataClient.

        - <xref href="MarketDataCollector.Application.Config.DataSourceKind.Alpaca" data-throw-if-not-resolved="false"></xref> uses Alpaca market data via WebSocket (trades; quotes optional in future).

        - <xref href="MarketDataCollector.Application.Config.DataSourceKind.StockSharp" data-throw-if-not-resolved="false"></xref> uses StockSharp connectors (Rithmic, IQFeed, CQG, IB, etc.).

        - <xref href="MarketDataCollector.Application.Config.DataSourceKind.NYSE" data-throw-if-not-resolved="false"></xref> uses the NYSE market data feed.
    - id: Alpaca
      type: MarketDataCollector.Application.Config.AlpacaOptions
      description: Alpaca provider options (required if DataSource == DataSourceKind.Alpaca).
    - id: IB
      type: MarketDataCollector.Application.Config.IBOptions
      description: Interactive Brokers provider options (required if DataSource == DataSourceKind.IB).
    - id: Polygon
      type: MarketDataCollector.Application.Config.PolygonOptions
      description: Polygon provider options (required if DataSource == DataSourceKind.Polygon).
    - id: StockSharp
      type: MarketDataCollector.Application.Config.StockSharpConfig
      description: StockSharp connector configuration (required if DataSource == DataSourceKind.StockSharp).
    - id: Storage
      type: MarketDataCollector.Application.Config.StorageConfig
      description: Storage configuration options (naming convention, partitioning, etc.).
    - id: Symbols
      type: MarketDataCollector.Contracts.Configuration.SymbolConfig[]
      description: Symbol subscriptions.
    - id: Backfill
      type: MarketDataCollector.Application.Config.BackfillConfig
      description: Optional historical backfill defaults.
    - id: Sources
      type: MarketDataCollector.Application.Config.SourceRegistryConfig
      description: Source registry persistence path.
    - id: DataSources
      type: MarketDataCollector.Application.Config.DataSourcesConfig
      description: Multiple data source configurations for real-time and historical data.
    - id: Derivatives
      type: MarketDataCollector.Application.Config.DerivativesConfig
      description: Derivatives (options) data collection configuration.
    - id: ProviderRegistry
      type: MarketDataCollector.Application.Config.ProviderRegistryConfig
      description: Unified provider registry configuration controlling attribute-based discovery.
    - id: Canonicalization
      type: MarketDataCollector.Application.Config.CanonicalizationConfig
      description: Canonicalization configuration for condition codes and venue MICs.
    - id: Validation
      type: MarketDataCollector.Application.Config.ValidationPipelineConfig
      description: Configuration for the F# validation pipeline stage.
