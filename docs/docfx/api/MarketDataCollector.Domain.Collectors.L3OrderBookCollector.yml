  assemblies:
  - MarketDataCollector.Domain
  namespace: MarketDataCollector.Domain.Collectors
  summary: >-
    Maintains per-symbol L3 order books from individual order lifecycle events

    and emits both the raw L3 events and derived L2 snapshots (dual-write).
  remarks: >-
    Use this collector for providers that supply order-level (ITCH/PITCH-style)

    message feeds. Providers that only support MBP/L2 deltas should continue

    using <xref href="MarketDataCollector.Domain.Collectors.MarketDepthCollector" data-throw-if-not-resolved="false"></xref> instead.


    Dual-write contract: every <code>On*</code> call publishes exactly two events in order —

    the L3 event followed by a derived <xref href="MarketDataCollector.Contracts.Domain.Models.LOBSnapshot" data-throw-if-not-resolved="false"></xref> (L2).

    Downstream consumers that only need L2 can filter by <xref href="MarketDataCollector.Contracts.Domain.Enums.MarketEventType.L2Snapshot" data-throw-if-not-resolved="false"></xref>;

    consumers that need order-level granularity subscribe to the L3 types (20–24).
  example: []
  syntax:
    content: 'public sealed class L3OrderBookCollector : SymbolSubscriptionTracker'
    content.vb: Public NotInheritable Class L3OrderBookCollector Inherits SymbolSubscriptionTracker
