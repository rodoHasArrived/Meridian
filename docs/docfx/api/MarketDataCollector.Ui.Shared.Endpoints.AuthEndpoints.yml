  summary: >-
    Maps the login page, login API, and logout API endpoints.


    <ul><li>GET  /login            – returns the login page HTML.</li><li>POST /api/auth/login   – validates credentials, sets a session cookie.</li><li>POST /api/auth/logout  – invalidates the session cookie.</li></ul>
