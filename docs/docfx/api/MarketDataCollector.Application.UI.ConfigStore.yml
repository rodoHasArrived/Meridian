  assemblies:
  - MarketDataCollector.Application
  namespace: MarketDataCollector.Application.UI
  summary: >-
    Service for loading and persisting application configuration.

    Provides access to config files, status files, and provider metrics.

    This is the single implementation shared by console, web, and desktop hosts.
  remarks: >-
    <p><b>Configuration Path Resolution:</b></p>

    <ul><li>If configPath is provided, it is used directly</li><li>If configPath is null, uses PathResolver delegate if set</li><li>Otherwise defaults to "appsettings.json" in the current directory</li></ul>
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Consolidated configuration store shared by all hosts")]

      public sealed class ConfigStore
    content.vb: >-
      <ImplementsAdr("ADR-001", "Consolidated configuration store shared by all hosts")>

      Public NotInheritable Class ConfigStore
