  assemblies:
  - MarketDataCollector.Application
  namespace: MarketDataCollector.Application.Pipeline
  summary: >-
    Registry that chains <xref href="MarketDataCollector.Contracts.Schema.ISchemaUpcaster%601" data-throw-if-not-resolved="false"></xref> instances to migrate stored records

    from any older schema version to the current version. Supports multi-step migration

    (e.g., v1 → v2 → v3) by composing upcasters into an ordered chain.
  remarks: >-
    Register upcasters at startup via DI or <xref href="MarketDataCollector.Application.Pipeline.SchemaUpcasterRegistry.Register(MarketDataCollector.Contracts.Schema.ISchemaUpcaster%7bMarketDataCollector.Domain.Events.MarketEvent%7d)" data-throw-if-not-resolved="false"></xref>. When the pipeline reads a

    stored record whose <code>SchemaVersion</code> is older than the current version, call

    <xref href="MarketDataCollector.Application.Pipeline.SchemaUpcasterRegistry.TryUpcast(System.String%2cSystem.Int32%2cMarketDataCollector.Domain.Events.MarketEvent%40)" data-throw-if-not-resolved="false"></xref> to produce a current-version <xref href="MarketDataCollector.Domain.Events.MarketEvent" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-007", "Schema evolution via chained upcasters for WAL/JSONL replay")]

      public sealed class SchemaUpcasterRegistry
    content.vb: >-
      <ImplementsAdr("ADR-007", "Schema evolution via chained upcasters for WAL/JSONL replay")>

      Public NotInheritable Class SchemaUpcasterRegistry
