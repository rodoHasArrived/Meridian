    parameters:
    - id: Provider
      type: System.String
      description: The name of the historical data provider to use.
    - id: Symbols
      type: System.Collections.Generic.IReadOnlyList{System.String}
      description: Symbols to backfill.
    - id: From
      type: System.Nullable{System.DateOnly}
      description: Optional inclusive start date.
    - id: To
      type: System.Nullable{System.DateOnly}
      description: Optional inclusive end date.
    - id: MaxConcurrentSymbols
      type: System.Nullable{System.Int32}
      description: >-
