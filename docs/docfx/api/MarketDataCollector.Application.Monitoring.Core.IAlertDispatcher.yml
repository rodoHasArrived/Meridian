  namespace: MarketDataCollector.Application.Monitoring.Core
  summary: Centralized alert dispatcher for publishing and subscribing to monitoring alerts.
  remarks: >-
    The alert dispatcher provides:

    - Centralized alert publishing from any component

    - Subscription with filtering capabilities

    - Alert history with configurable retention

    - Thread-safe operations
  example: []
  syntax:
