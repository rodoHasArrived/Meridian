  assemblies:
  - MarketDataCollector.Infrastructure
  namespace: MarketDataCollector.Infrastructure.Adapters.Core
  summary: >-
    Unified factory for creating and registering all provider types (streaming, backfill, symbol search).

    This replaces scattered provider creation logic with a single entry point.
  remarks: >-
    The factory uses capability-driven registration where all providers implement

    <xref href="MarketDataCollector.Infrastructure.Adapters.Core.IProviderMetadata" data-throw-if-not-resolved="false"></xref> and are registered in a unified <xref href="MarketDataCollector.Infrastructure.Adapters.Core.ProviderRegistry" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: >-
      [ImplementsAdr("ADR-001", "Unified provider factory for capability-driven registration")]

      public sealed class ProviderFactory
