  assemblies:
  - MarketDataCollector.Domain
  namespace: MarketDataCollector.Domain.Events
  summary: >-
    Exposes pipeline backpressure state so upstream producers can self-throttle

    instead of having events silently dropped.
  remarks: >-
    Producers (adapters, collectors) should query <xref href="MarketDataCollector.Domain.Events.IBackpressureSignal.IsUnderPressure" data-throw-if-not-resolved="false"></xref> before

    publishing a new event and pause or reduce their publishing rate when the signal is active.

    The <xref href="MarketDataCollector.Domain.Events.IBackpressureSignal.QueueUtilization" data-throw-if-not-resolved="false"></xref> property can be used for more nuanced throttling

    (e.g. introduce delay when utilization exceeds a threshold).
  example: []
  syntax:
    content: public interface IBackpressureSignal
    content.vb: Public Interface IBackpressureSignal
