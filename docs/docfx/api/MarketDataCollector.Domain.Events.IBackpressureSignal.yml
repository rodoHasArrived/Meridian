  summary: >-
    Returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> when the downstream queue utilization has reached or

    exceeded the warning threshold (typically 80 %).

    Producers should pause or slow down when this returns <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a>.
