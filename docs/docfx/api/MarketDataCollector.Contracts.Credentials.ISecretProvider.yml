  summary: Retrieves a secret value for the given path and key.
  example: []
  syntax:
    content: Task<string?> GetSecretAsync(string path, string key, CancellationToken ct = default)
    parameters:
    - id: path
      type: System.String
      description: Vault path or secret group (e.g., "marketdata/alpaca/prod").
    - id: key
      type: System.String
      description: Individual key within the secret (e.g., "keyId", "secretKey").
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task{System.String}
      description: The secret value, or null if not found.
