  assemblies:
  - MarketDataCollector.Infrastructure
  namespace: MarketDataCollector.Infrastructure.Adapters.StockSharp
  summary: >-
    IMarketDataClient implementation that wraps StockSharp connectors.

    Provides unified access to 90+ data sources through the S# adapter pattern.


    Features (inspired by Hydra best practices):

    - Automatic reconnection with exponential backoff

    - Subscription recovery after reconnection

    - Connection health monitoring with heartbeats

    - Message buffering for high-frequency data


    Supported data types:

    - Trades (tick-by-tick)

    - Market Depth (Level 2 order books)

    - Quotes (BBO)


    See StockSharpConnectorFactory for available connector types.
  example: []
  syntax:
    content: >-
      [DataSource("stocksharp", "StockSharp", DataSourceType.Realtime, DataSourceCategory.Aggregator, Priority = 20, Description = "StockSharp connector providing access to 90+ data sources")]

      [ImplementsAdr("ADR-001", "StockSharp streaming data provider implementation")]

      [ImplementsAdr("ADR-004", "All async methods support CancellationToken")]

      [ImplementsAdr("ADR-005", "Attribute-based provider discovery")]

      public sealed class StockSharpMarketDataClient : IMarketDataClient, IProviderMetadata, IAsyncDisposable
    content.vb: >-
      <DataSource("stocksharp", "StockSharp", DataSourceType.Realtime, DataSourceCategory.Aggregator, Priority:=20, Description:="StockSharp connector providing access to 90+ data sources")>

      <ImplementsAdr("ADR-001", "StockSharp streaming data provider implementation")>

      <ImplementsAdr("ADR-004", "All async methods support CancellationToken")>

      <ImplementsAdr("ADR-005", "Attribute-based provider discovery")>

      Public NotInheritable Class StockSharpMarketDataClient Implements IMarketDataClient, IProviderMetadata, IAsyncDisposable
