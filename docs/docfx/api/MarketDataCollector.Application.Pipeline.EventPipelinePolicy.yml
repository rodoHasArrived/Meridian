  assemblies:
  - MarketDataCollector.Core
  namespace: MarketDataCollector.Application.Pipeline
  summary: >-
    Central configuration policy for bounded-channel pipelines.

    Provides consistent backpressure settings across the application.


    <p>

    Use static presets for common scenarios:


    <ul><li><xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.Default" data-throw-if-not-resolved="false"></xref> - General-purpose event pipelines (100k capacity, DropOldest)</li><li><xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.HighThroughput" data-throw-if-not-resolved="false"></xref> - Streaming data pipelines (50k capacity, DropOldest)</li><li><xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.MessageBuffer" data-throw-if-not-resolved="false"></xref> - Internal message buffering (50k capacity, DropOldest, no metrics)</li><li><xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.MaintenanceQueue" data-throw-if-not-resolved="false"></xref> - Background tasks (100 capacity, Wait/backpressure)</li><li><xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.Logging" data-throw-if-not-resolved="false"></xref> - Log channels (1k capacity, DropOldest)</li><li><xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.CompletionQueue" data-throw-if-not-resolved="false"></xref> - Completion notifications (500 capacity, Wait/backpressure)</li></ul>

    </p>
  remarks: >-
    All channel creation in the application should use this policy to ensure consistent

    backpressure behavior. Use <xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.CreateChannel%60%601(System.Boolean%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> for direct channel creation

    or <xref href="MarketDataCollector.Application.Pipeline.EventPipelinePolicy.ToBoundedOptions(System.Boolean%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref> when you need to configure additional options.
