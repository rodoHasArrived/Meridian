  summary: >-
    Creates a bounded channel with this policy's configuration.

    This is the preferred method for creating channels to ensure consistent backpressure behavior.
  example:
  - >-
    <pre><code class="lang-csharp">// Using a preset

    var channel = EventPipelinePolicy.Logging.CreateChannel&lt;LogEntry&gt;();


    // Using default policy

    var channel = EventPipelinePolicy.Default.CreateChannel&lt;MarketEvent&gt;();</code></pre>
  syntax:
    content: public Channel<T> CreateChannel<T>(bool singleReader = true, bool singleWriter = false)
    parameters:
    - id: singleReader
      type: System.Boolean
      description: Whether there is a single consumer reading from the channel. Default is true.
    - id: singleWriter
      type: System.Boolean
      description: Whether there is a single producer writing to the channel. Default is false.
    typeParameters:
    - id: T
      description: The type of items in the channel.
    return:
      type: System.Threading.Channels.Channel{{T}}
      description: A configured bounded channel.
