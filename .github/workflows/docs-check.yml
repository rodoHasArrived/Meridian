name: Documentation Checks

on:
  pull_request:
    branches: ["main", "develop"]
    paths:
      - 'docs/**'
      - '**/*.md'
      - 'build/scripts/docs/**'
      - '.github/workflows/docs-check.yml'
  push:
    branches: ["main"]
    paths:
      - 'docs/**'
      - '**/*.md'
      - 'build/scripts/docs/**'
      - '.github/workflows/docs-check.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docs-check:
    name: Lint and validate docs
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Detect changed markdown files
        id: changed_markdown
        uses: tj-actions/changed-files@v47
        with:
          separator: "\n"
          files: |
            **/*.md

      - name: Install markdown linter
        if: steps.changed_markdown.outputs.any_changed == 'true' || github.event_name == 'workflow_dispatch'
        run: npm install --global markdownlint-cli2

      - name: Markdown lint (changed files)
        if: steps.changed_markdown.outputs.any_changed == 'true'
        run: |
          mapfile -t changed_files << 'EOF'
          ${{ steps.changed_markdown.outputs.all_changed_files }}
          EOF

          if [ "${#changed_files[@]}" -eq 0 ]; then
            echo "No markdown files changed."
            exit 0
          fi

          echo "Linting ${#changed_files[@]} markdown file(s)."
          markdownlint-cli2 "${changed_files[@]}"

      - name: Markdown lint (manual full scan)
        if: github.event_name == 'workflow_dispatch' && steps.changed_markdown.outputs.any_changed != 'true'
        run: markdownlint-cli2 "**/*.md" "#node_modules"

      - name: Link repair analysis (non-blocking)
        continue-on-error: true
        run: |
          mkdir -p .artifacts
          python3 build/scripts/docs/repair-links.py \
            --root . \
            --docs-dir docs \
            --output .artifacts/link-repair-report.md \
            --summary | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Code example validation report (non-blocking)
        continue-on-error: true
        run: |
          mkdir -p .artifacts
          python3 build/scripts/docs/validate-examples.py \
            --root . \
            --docs-dir docs \
            --output .artifacts/examples-validation-report.md \
            --summary | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Upload docs validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: docs-check-reports
          path: .artifacts/
          if-no-files-found: ignore
