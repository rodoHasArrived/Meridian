name: Python Package using Conda

on:
  push:
    branches: ["main"]
    paths:
      - "environment.yml"
      - ".github/workflows/python-package-conda.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "environment.yml"
      - ".github/workflows/python-package-conda.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: python-conda-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Conda environment validation
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      max-parallel: 1

    steps:
    - uses: actions/checkout@v4
    - name: Set up Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        activate-environment: base
        environment-file: environment.yml
        python-version: "3.10"
        auto-activate-base: true
    - name: Verify conda
      run: |
        conda --version
        conda info
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 scripts tests .github --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 scripts tests .github --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - name: Compile Python utility
      run: |
        python -m py_compile scripts/compare_benchmarks.py
