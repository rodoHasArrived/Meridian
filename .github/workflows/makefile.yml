name: Makefile CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Restore dependencies
      run: dotnet restore Meridian.sln /p:EnableWindowsTargeting=true

    - name: Build
      run: dotnet build Meridian.sln -c Release --no-restore /p:EnableWindowsTargeting=true

    - name: Run tests
      run: dotnet test Meridian.sln -c Release --no-build /p:EnableWindowsTargeting=true --filter "Category!=Integration"
